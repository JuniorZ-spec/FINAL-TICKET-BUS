name: CD

on:
  push:
    branches: [main, develop]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND: ${{ secrets.ECR_REGISTRY }}/ticketbus-backend
  ECR_FRONTEND: ${{ secrets.ECR_REGISTRY }}/ticketbus-frontend

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer les credentials AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Se connecter à ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_BACKEND }}:${{ github.sha }}
            ${{ env.ECR_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push — image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.ECR_FRONTEND }}:${{ github.sha }}
            ${{ env.ECR_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Déployer sur EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin 915993062361.dkr.ecr.eu-west-3.amazonaws.com
            docker compose -f /home/ubuntu/docker-compose.prod.yml pull
            docker compose -f /home/ubuntu/docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f