name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

# id-token: write est requis pour que aws-actions/configure-aws-credentials
# puisse échanger le jeton OIDC de ce run contre des credentials AWS
# temporaires — aucune clé d'accès statique stockée en secret.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-3
  ECR_BACKEND_REPO: ticketbus-backend

jobs:
  # Ce job construit et pousse l'image backend vers ECR à chaque push sur
  # main/develop qui passe la CI. C'est la seule chose automatique : il n'y
  # a pas d'infra à jour à chaque push (VPC/ECS/RDS n'existent que pendant
  # une session de démo, voir docs/demo-runbook.md — Phase 8). Le
  # déploiement réel (terraform apply + ecs update-service) sera un job
  # séparé déclenché manuellement (workflow_dispatch), ajouté en Phase 4
  # quand le service ECS existera.
  build-and-push:
    name: Build & push — backend
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configurer les credentials AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Se connecter à ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push — image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          # Pas de tag "latest" : le repo ECR est immutable (voir
          # terraform/ecr), chaque image est identifiée par le sha exact du
          # commit qui l'a produite — traçabilité, pas de pointeur mutable.
          tags: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_BACKEND_REPO }}:sha-${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Le frontend (S3 + CloudFront) est permanent, pas éphémère comme le
  # reste de l'infra — donc, contrairement au backend, ça a du sens de le
  # tenir à jour automatiquement à chaque push. VITE_API_URL pointe vers
  # rien tant que la Phase 4 (ALB) n'existe pas : les appels /api/* échouent,
  # c'est attendu et sans conséquence (juste le site vitrine qui charge).
  deploy-frontend:
    name: Deploy frontend — S3 + CloudFront
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client
        env:
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Configurer les credentials AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Synchroniser vers S3
        run: aws s3 sync client/dist "s3://${{ vars.FRONTEND_BUCKET }}" --delete

      - name: Invalider le cache CloudFront
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
