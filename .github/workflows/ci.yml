name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop, feature/**]

jobs:
  # ── Job 1 : Lint & format du backend ──────────────────────────────────────
  lint-backend:
    name: Lint — Backend
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: backend

      - name: ESLint
        run: npx eslint . --ext .ts
        working-directory: backend

      - name: Prettier — vérification du formatage
        run: npx prettier --check .
        working-directory: backend

  # ── Job 2 : Lint & format du frontend ─────────────────────────────────────
  lint-client:
    name: Lint — Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: client

      - name: ESLint
        run: npx eslint src --ext .js,.jsx
        working-directory: client
        env:
          ESLINT_USE_FLAT_CONFIG: "false"

      - name: Prettier — vérification du formatage
        run: npx prettier --check src
        working-directory: client

  # ── Job 3 : Vérification TypeScript ──────────────────────────────────────
  typecheck-backend:
    name: Typecheck — Backend
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci
        working-directory: backend

      - name: Générer le client Prisma
        run: npx prisma generate
        working-directory: backend

      - name: TypeScript — vérification des types
        run: npx tsc --noEmit
        working-directory: backend

  # ── Job 4 : Audit de sécurité ──────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Audit backend
        run: npm audit --audit-level=critical
        working-directory: backend

      - name: Audit frontend
        run: npm audit --audit-level=critical
        working-directory: client

  # ── Job 5 : Scan Trivy (vulnérabilités + configuration IaC) ────────────────
  trivy:
    name: Trivy scan
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Scan vulnérabilités — dépendances backend et frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          skip-dirs: node_modules,client/node_modules,backend/node_modules
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1

      - name: Scan configuration — Dockerfiles et Terraform
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1

  # ── Job 6 : Build des images Docker ───────────────────────────────────────
  # Tourne seulement si lint + typecheck + scan Trivy passent
  build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-client, typecheck-backend, trivy]

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build — image backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build — image frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
